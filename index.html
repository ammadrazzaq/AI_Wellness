<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a33;
      --text: #eaf0ff;
      --muted: #9fb0da;
      --primary: #5b8cff;
      --danger: #ff5f7a;
      --ok: #3ad29f;
      --border: #22305f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1b2b5a 0, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, #182449 0%, var(--card) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 14px; color: var(--muted); }
    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      color: var(--muted);
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0d1530;
      color: var(--text);
      outline: none;
    }
    input:focus { border-color: var(--primary); }
    button {
      margin-top: 16px;
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, #4d7fff, #7d5bff);
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      border: 1px solid transparent;
      display: none;
      white-space: pre-wrap;
    }
    .msg.show { display: block; }
    .msg.error {
      background: rgba(255, 95, 122, 0.12);
      border-color: rgba(255, 95, 122, 0.4);
      color: #ffd8e0;
    }
    .msg.ok {
      background: rgba(58, 210, 159, 0.12);
      border-color: rgba(58, 210, 159, 0.4);
      color: #d8ffef;
    }
    .small {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    code { background: #0d1530; padding: 2px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Reset your password</h1>
    <p>Enter your new password below.</p>

    <form id="reset-form">
      <label for="password">New password</label>
      <input id="password" type="password" minlength="6" required placeholder="At least 6 characters" />

      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" minlength="6" required placeholder="Re-enter password" />

      <button id="submitBtn" type="submit">Update password</button>
    </form>

    <div id="message" class="msg"></div>
    <div class="small">After success, return to the app and sign in with your new password.</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // TODO: Replace with your own project values before deploying.
    const SUPABASE_URL = "https://saxcscfwuvtwyffujwkn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ZNpnQweF-Z79Bv6nU_LgSQ_5bxHnghR";

    const form = document.getElementById("reset-form");
    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const messageEl = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");

    function setMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = "msg show " + (type || "error");
    }

    function parseAuthParams() {
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const query = new URLSearchParams(window.location.search);
      return {
        access_token: hash.get("access_token") || query.get("access_token"),
        refresh_token: hash.get("refresh_token") || query.get("refresh_token"),
        type: hash.get("type") || query.get("type")
      };
    }

    async function run() {
      if (!SUPABASE_URL.includes("supabase.co") || SUPABASE_ANON_KEY.startsWith("YOUR_")) {
        setMessage("Configure SUPABASE_URL and SUPABASE_ANON_KEY in index.html before using this page.", "error");
        submitBtn.disabled = true;
        return;
      }

      const params = parseAuthParams();
      if (!params.access_token || !params.refresh_token || params.type !== "recovery") {
        setMessage("Invalid or missing recovery token. Please open the reset link directly from the email.", "error");
        submitBtn.disabled = true;
        return;
      }

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { error } = await supabase.auth.setSession({
        access_token: params.access_token,
        refresh_token: params.refresh_token
      });
      if (error) {
        setMessage("Could not validate reset token: " + error.message, "error");
        submitBtn.disabled = true;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = passwordInput.value.trim();
        const confirmPassword = confirmInput.value.trim();

        if (password.length < 6) {
          setMessage("Password must be at least 6 characters.", "error");
          return;
        }
        if (password !== confirmPassword) {
          setMessage("Passwords do not match.", "error");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Updating...";

        const { error: updateError } = await supabase.auth.updateUser({ password });
        if (updateError) {
          setMessage("Failed to update password: " + updateError.message, "error");
          submitBtn.disabled = false;
          submitBtn.textContent = "Update password";
          return;
        }

        setMessage("Password updated successfully. You can now return to the app and sign in.", "ok");
        submitBtn.textContent = "Password updated";
      });
    }

    run();
  </script>
</body>
</html>
